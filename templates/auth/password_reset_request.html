{% extends 'base.html' %}
{% block title %}Set New Password — WebMaps{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg></div>
      <h1>Set New Password</h1>
      <p>Choose a strong new password</p>
    </div>

    {% if error %}<div class="alert alert-error">{{ error }}</div>{% endif %}

    <form method="post" action="{% url 'auth_app:password_reset_confirm' %}" id="confirm-form">
      {% csrf_token %}
      <input type="hidden" name="token" value="{{ token }}">
      <input type="hidden" name="uid" value="{{ uid }}">

      <div class="form-group">
        <label class="form-label" for="new-password">New Password</label>
        <input type="password" id="new-password" name="new_password" class="form-control"
               placeholder="••••••••" required autocomplete="new-password">
      </div>
      <div class="form-group mb-6">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm_password" class="form-control"
               placeholder="••••••••" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-block btn-lg" id="confirm-btn">
        Reset Password
      </button>
    </form>

    <div class="auth-footer mt-6 text-center">
      <a href="{% url 'auth_app:login' %}" class="text-secondary text-sm">Back to Sign In</a>
    </div>
  </div>
</div>
{% endblock %}
