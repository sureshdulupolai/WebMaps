{% extends 'base.html' %}
{% load static %}

{% block title %}Set New Password — WebMaps{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card" style="max-width: 480px;">
    <div class="auth-logo">
      <div class="logo-icon mx-auto" style="width: 48px; height: 48px; background: var(--primary); color: white; border-radius: 12px; display: grid; place-items: center; box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      </div>
      <h1 style="margin-top: 20px;">Set New Password</h1>
      <p>Choose a strong new password</p>
    </div>

    {% if error %}
      <div class="alert alert-error mb-5" style="padding: 12px 16px; border-radius: 10px; font-size: 13px;">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'auth_app:password_reset_confirm' %}" id="confirm-form">
      {% csrf_token %}
      <input type="hidden" name="token" value="{{ token }}">
      <input type="hidden" name="uid" value="{{ uid }}">

      <div class="form-group-premium mb-4">
        <label class="form-label-premium" for="new-password">New Password</label>
        <div class="input-wrapper-premium">
          <input type="password" id="new-password" name="new_password" class="input-premium-auth"
                 placeholder="••••••••" required autocomplete="new-password"
                 style="height: 52px; background: rgba(255, 255, 255, 0.03);">
          <button type="button" class="pwd-toggle-btn" data-target="new-password">
             <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group-premium mb-8">
        <label class="form-label-premium" for="confirm-password">Confirm Password</label>
        <div class="input-wrapper-premium">
          <input type="password" id="confirm-password" name="confirm_password" class="input-premium-auth"
                 placeholder="••••••••" required autocomplete="new-password"
                 style="height: 52px; background: rgba(255, 255, 255, 0.03);">
          <button type="button" class="pwd-toggle-btn" data-target="confirm-password">
             <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-block" style="height: 52px; border-radius: 12px; font-weight: 700;">
        Reset Password
      </button>
    </form>

    <div class="auth-footer mt-8 text-center">
      <a href="{% url 'auth_app:login' %}" class="text-secondary text-sm hover-underline" style="font-weight: 600;">
        Back to Sign In
      </a>
    </div>
  </div>
</div>
{% endblock %}
