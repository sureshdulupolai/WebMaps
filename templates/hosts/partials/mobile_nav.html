<!-- templates/hosts/partials/mobile_nav.html -->
<div class="mobile-bottom-nav">
  <a href="{% url 'hosts:dashboard' %}" class="mobile-nav-item {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
    <div class="nav-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
    </div>
    <span class="nav-label">Overview</span>
  </a>

  {% if listing %}
    <!-- If on a specific listing page (Insights, Billing, Edit) -->
    <a href="{% url 'hosts:listing_insights' listing.slug %}" class="mobile-nav-item {% if request.resolver_match.url_name == 'listing_insights' %}active{% endif %}">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      </div>
      <span class="nav-label">Insights</span>
    </a>
    <a href="{% url 'hosts:listing_edit' listing.slug %}" class="mobile-nav-item center-item">
      <div class="nav-icon-plus">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" /></svg>
      </div>
    </a>
    <a href="{% url 'hosts:listing_billing' listing.slug %}" class="mobile-nav-item {% if request.resolver_match.url_name == 'listing_billing' %}active{% endif %}">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
      </div>
      <span class="nav-label">Billing</span>
    </a>
  {% else %}
    <!-- On general Dashboard -->
    <a href="{% url 'hosts:listing_create' %}" class="mobile-nav-item center-item">
      <div class="nav-icon-plus">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/></svg>
      </div>
    </a>
    <a href="{% url 'notifications:page' %}" class="mobile-nav-item {% if request.resolver_match.url_name == 'page' %}active{% endif %}">
      <div class="nav-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
      </div>
      <span class="nav-label">Alerts</span>
    </a>
  {% endif %}

  <!-- Logout using POST to avoid 405 error -->
  <form id="mobile-logout-form" method="post" action="{% url 'auth_app:logout' %}" style="display:none;">
    {% csrf_token %}
  </form>
  <a href="javascript:void(0);" onclick="document.getElementById('mobile-logout-form').submit();" class="mobile-nav-item">
    <div class="nav-icon">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
    </div>
    <span class="nav-label">Exit</span>
  </a>
</div>

<style>
.mobile-bottom-nav {
    display: none;
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 90%;
    max-width: 450px;
    height: 70px;
    background: rgba(13, 15, 23, 0.85);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    z-index: 10000; /* High priority */
    padding: 0 15px;
    align-items: center;
    justify-content: space-around;
    box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
}

.mobile-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: rgba(255, 255, 255, 0.5);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    flex: 1;
    cursor: pointer;
}

.mobile-nav-item.active {
    color: #6366f1;
}

.nav-icon {
    margin-bottom: 4px;
    display: flex;
    align-items: center;
}

.nav-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.center-item {
    position: relative;
    top: -20px;
}

.nav-icon-plus {
    width: 56px;
    height: 56px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    box-shadow: 0 10px 20px rgba(99, 102, 241, 0.4);
    border: 4px solid #0d0f17;
    transition: transform 0.2s ease;
}

.nav-icon-plus:active {
    transform: scale(0.9);
}

@media (max-width: 992px) {
    .mobile-bottom-nav {
        display: flex;
    }
}
</style>
